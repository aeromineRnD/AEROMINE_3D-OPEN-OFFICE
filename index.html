<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aeromine - Open Office 3D Map</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-logo">
      <span class="header-logo-icon">🏢</span>
      <span class="header-logo-text">AEROMINE <em>OPEN OFFICE</em></span>
    </div>
    <div class="header-search">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Search…" autocomplete="off" />
    </div>
  </header>

  <button id="btn-reset" title="Reset camera">⌂</button>

  <div id="app">
    <div id="spinner">
      <div class="spinner-ring"></div>
      <span>Loading 3D model…</span>
    </div>
  </div>

  <footer class="site-footer">
    <span class="footer-brand">Aeromine RnD</span>
    <span class="footer-sep">·</span>
    <a href="https://www.linkedin.com/company/aeromine-info" target="_blank" rel="noopener">LinkedIn</a>
    <span class="footer-sep">·</span>
    <a href="https://www.aeromine.info/" target="_blank" rel="noopener">www.aeromine.info</a>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
